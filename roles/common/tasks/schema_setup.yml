- name: copy mongodb repo file
  ansible.builtin.copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo
  when: schema_setup == "mongo"

- name: Install MongoDB Client
  ansible.builtin.yum:
    name: mongodb-org-shell
    state: installed
  when: schema_setup == "mongo"

- name: load sheema
  ansible.builtin.shell: mongo --host {{ lookup('aws_ssm', 'dev.frontend.payment_url', region='us-east-1' ) }} </app/schema/{{component}}.js
  when: schema_setup == "mongo"